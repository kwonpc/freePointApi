<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #4b5563; }
      .group { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .public { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .private { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .data { fill: #ffedd5; stroke: #ea580c; stroke-width: 2; }
      .ops { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; }
      .client { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .text-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .text-body { font: 14px Arial, sans-serif; fill: #1f2937; }
      .text-small { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #475569; stroke-width: 2.5; fill: none; }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
    </style>
  </defs>

  <text x="40" y="42" class="title">AWS Architecture Assumption</text>
  <text x="40" y="68" class="subtitle">Free Point System API deployment example</text>

  <rect x="40" y="110" width="210" height="110" rx="12" ry="12" class="client"/>
  <text x="60" y="145" class="text-title">Client</text>
  <text x="60" y="175" class="text-body">Admin UI</text>
  <text x="60" y="198" class="text-body">Order Service</text>

  <rect x="300" y="90" width="1260" height="840" rx="18" ry="18" class="group"/>
  <text x="325" y="125" class="text-title">AWS Region / VPC</text>

  <rect x="340" y="160" width="1180" height="170" rx="14" ry="14" class="public"/>
  <text x="365" y="195" class="text-title">Public Tier</text>

  <rect x="380" y="220" width="190" height="70" rx="10" ry="10" class="public"/>
  <text x="400" y="248" class="text-title">Route 53</text>
  <text x="400" y="272" class="text-body">API Domain</text>

  <rect x="620" y="220" width="210" height="70" rx="10" ry="10" class="public"/>
  <text x="640" y="248" class="text-title">CloudFront</text>
  <text x="640" y="272" class="text-body">TLS / Edge Cache</text>

  <rect x="880" y="220" width="180" height="70" rx="10" ry="10" class="public"/>
  <text x="900" y="248" class="text-title">WAF</text>
  <text x="900" y="272" class="text-body">Rate Limit</text>

  <rect x="1110" y="220" width="180" height="70" rx="10" ry="10" class="public"/>
  <text x="1130" y="248" class="text-title">ALB</text>
  <text x="1130" y="272" class="text-body">HTTPS Entry</text>

  <rect x="340" y="380" width="1180" height="230" rx="14" ry="14" class="private"/>
  <text x="365" y="415" class="text-title">Private App Tier</text>

  <rect x="380" y="450" width="300" height="110" rx="10" ry="10" class="private"/>
  <text x="400" y="478" class="text-title">ECS Fargate Service</text>
  <text x="400" y="504" class="text-body">Spring Boot API</text>
  <text x="400" y="528" class="text-body">Point Command / Query</text>

  <rect x="730" y="450" width="220" height="110" rx="10" ry="10" class="private"/>
  <text x="750" y="478" class="text-title">Auto Scaling</text>
  <text x="750" y="504" class="text-body">Multi-AZ Tasks</text>
  <text x="750" y="528" class="text-body">CPU / Memory Scale</text>

  <rect x="1000" y="450" width="220" height="110" rx="10" ry="10" class="private"/>
  <text x="1020" y="478" class="text-title">Secrets Manager</text>
  <text x="1020" y="504" class="text-body">DB Credential</text>
  <text x="1020" y="528" class="text-body">App Secret</text>

  <rect x="1270" y="450" width="210" height="110" rx="10" ry="10" class="private"/>
  <text x="1290" y="478" class="text-title">SQS</text>
  <text x="1290" y="504" class="text-body">Async Events</text>
  <text x="1290" y="528" class="text-body">Optional</text>

  <rect x="340" y="660" width="1180" height="150" rx="14" ry="14" class="data"/>
  <text x="365" y="695" class="text-title">Data Tier</text>

  <rect x="390" y="720" width="280" height="60" rx="10" ry="10" class="data"/>
  <text x="410" y="747" class="text-title">Amazon RDS</text>
  <text x="410" y="769" class="text-body">PostgreSQL / MySQL</text>

  <rect x="730" y="720" width="240" height="60" rx="10" ry="10" class="data"/>
  <text x="750" y="747" class="text-title">Read Replica</text>
  <text x="750" y="769" class="text-body">Optional Query Scale</text>

  <rect x="1030" y="720" width="200" height="60" rx="10" ry="10" class="data"/>
  <text x="1050" y="747" class="text-title">ElastiCache</text>
  <text x="1050" y="769" class="text-body">Policy / Hot Read</text>

  <rect x="1290" y="720" width="160" height="60" rx="10" ry="10" class="data"/>
  <text x="1310" y="747" class="text-title">S3</text>
  <text x="1310" y="769" class="text-body">Logs / Artifacts</text>

  <rect x="340" y="850" width="1180" height="60" rx="14" ry="14" class="ops"/>
  <text x="365" y="885" class="text-title">CloudWatch / X-Ray / EventBridge Scheduler / CI-CD</text>

  <path d="M250 165 L380 165" class="line"/>
  <text x="275" y="155" class="text-small">API Call</text>

  <path d="M570 255 L620 255" class="line"/>
  <path d="M830 255 L880 255" class="line"/>
  <path d="M1060 255 L1110 255" class="line"/>
  <text x="905" y="205" class="text-small">HTTPS path</text>

  <path d="M1290 255 L1290 360 L530 360 L530 450" class="line"/>
  <text x="1180" y="342" class="text-small">Forward to service</text>

  <path d="M530 560 L530 660" class="line"/>
  <text x="545" y="620" class="text-small">Transactional writes</text>

  <path d="M1120 560 L1120 660" class="dash"/>
  <text x="1140" y="620" class="text-small">Cache / secret access</text>

  <path d="M1375 560 L1375 850" class="dash"/>
  <text x="1390" y="705" class="text-small">logs / metrics</text>
</svg>
